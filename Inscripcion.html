<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --azul: #1565c0;
    }

    body {
      background: #f5f7fa;
      padding-bottom: 30px;
    }

    .header-inst {
      background: white;
      padding: 20px;
      border-bottom: 4px solid var(--azul);
      margin-bottom: 30px;
    }

    .form-container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .btn-large {
      width: 100%;
      border-radius: 12px;
      font-weight: bold;
      text-transform: none;
      height: 55px;
      line-height: 55px;
    }

    .bold {
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="header-inst center-align">
    <h5 class="bold blue-text text-darken-4">Sistema de Licencias</h5>
  </div>

  <div class="container">
    <div class="form-container">
      <h5 class="center-align" style="margin-bottom:30px;">Formulario de Inscripción</h5>
      <form id="formInscripcion">

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">person</i><input type="text" id="nombre"><label for="nombre">Nombre</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">person_outline</i><input type="text" id="apellido" ><label for="apellido">Apellido</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">badge</i><input type="number" id="dni" oninput="this.value = this.value.replace(/\D/g, '')"><label for="dni">D N I</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">cake</i><input type="date" id="fechaNacimiento" ><label for="fechaNacimiento">Fecha de Nacimiento</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">email</i><input type="email" id="email"><label for="email">Correo Electrónico</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">phone</i><input type="tel" id="telefono"><label for="telefono">Teléfono (Ej.: 2324421370)</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <i class="material-icons prefix">commute</i>
            <select id="categoria">
              <option value="" disabled selected>Seleccione Categoría</option>
              <option value="A">A - Motos</option>
              <option value="B">B - Autos</option>
              <option value="AyB">A y B - Motos y Autos</option>
            </select>
            <label>Categoría de Licencia</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">map</i>
            <select id="selectBarrio" onchange="filtrarPorBarrio()">
              <option value="" disabled selected>Cargando...</option>
            </select>
            <label>Seleccionar Barrio</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">account_balance</i>
            <select id="selectInstitucion" onchange="filtrarPorInstitucion()">
              <option value="" disabled selected>Cargando...</option>
            </select>
            <label>Seleccionar Institución</label>
          </div>
        </div>

        <button type="submit" id="btnEnviar" class="btn-large blue darken-3 waves-effect">
          Enviar Inscripción <i class="material-icons right">send</i>
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    let TODAS_OPCIONES = [];

    document.addEventListener('DOMContentLoaded', function() {
      M.AutoInit();
      cargarLugares();
    });

    function cargarLugares() {
      google.script.run.withSuccessHandler(opciones => {
        TODAS_OPCIONES = opciones;
        actualizarSelects(opciones);
      }).obtenerOpcionesCursada();
    }

    function cargarSedesDinamicas() {
      google.script.run.withSuccessHandler(sedes => {
        const select = document.getElementById('selectSede'); // El ID de tu select
        select.innerHTML = '<option value="" disabled selected>Seleccione una sede</option>';
        
        sedes.forEach(s => {
          select.innerHTML += `<option value="${s.institucion}">${s.barrio} - ${s.institucion}</option>`;
        });
        
        // Si usas Materialize, hay que reinicializar el select:
        M.FormSelect.init(select);
      }).obtenerSedesActivas();
    }

    function actualizarSelects(data) {
      const sBarrio = document.getElementById('selectBarrio');
      const sInst = document.getElementById('selectInstitucion');
      
      const barriosUnicos = [...new Set(data.map(item => item.barrio))];
      const instUnicas = [...new Set(data.map(item => item.institucion))];

      sBarrio.innerHTML = '<option value="" selected>Todos los barrios</option>';
      barriosUnicos.forEach(b => {
        sBarrio.innerHTML += `<option value="${b}">${b}</option>`;
      });

      sInst.innerHTML = '<option value="" disabled selected>Seleccione Institución</option>';
      data.forEach(item => {
        let dis = item.deshabilitado ? 'disabled' : '';
        sInst.innerHTML += `<option value="${item.institucion}" ${dis}>${item.texto}</option>`;
      });

      M.FormSelect.init(sBarrio);
      M.FormSelect.init(sInst);
    }

    function filtrarPorBarrio() {
      const barrio = document.getElementById('selectBarrio').value;
      const sInst = document.getElementById('selectInstitucion');
      
      if (!barrio) {
        actualizarSelects(TODAS_OPCIONES);
        return;
      }

      const filtrados = TODAS_OPCIONES.filter(o => o.barrio === barrio);
      sInst.innerHTML = '<option value="" disabled selected>Instituciones en ' + barrio + '</option>';
      filtrados.forEach(item => {
        let dis = item.deshabilitado ? 'disabled' : '';
        sInst.innerHTML += `<option value="${item.institucion}" ${dis}>${item.texto}</option>`;
      });
      M.FormSelect.init(sInst);
    }

    function filtrarPorInstitucion() {
      const inst = document.getElementById('selectInstitucion').value;
      const sBarrio = document.getElementById('selectBarrio');
      
      const encontrado = TODAS_OPCIONES.find(o => o.institucion === inst);
      if (encontrado) {
        sBarrio.value = encontrado.barrio;
        M.FormSelect.init(sBarrio);
      }
    }

      document.getElementById('formInscripcion').addEventListener('submit', function(e) {
  e.preventDefault();

  const datos = {
    nombre: document.getElementById('nombre').value.trim(),
    apellido: document.getElementById('apellido').value.trim(),
    dni: document.getElementById('dni').value.toString().replace(/\D/g, ""),
    fechaNac: document.getElementById('fechaNacimiento').value,
    email: document.getElementById('email').value.trim(),
    tel: document.getElementById('telefono').value.trim(),
    cat: document.getElementById('categoria').value,
    inst: document.getElementById('selectInstitucion').value
  };

  // 1. Validación de campos vacíos
  if (Object.values(datos).some(valor => !valor)) {
    return Swal.fire('Atención', 'Por favor, completa todos los campos.', 'warning');
  }

  // 2. Validación de Email (Regex)
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(datos.email)) {
    return Swal.fire('Email Inválido', 'Por favor ingresa un correo electrónico real.', 'error');
  }

  // 3. Validación de Edad (Entre 16 y 64 años)
  const edad = calcularEdad(datos.fechaNac);
  if (edad < 16) {
    return Swal.fire('Edad insuficiente', 'Debes tener al menos 16 años.', 'error');
  }
  if (edad > 64) {
    return Swal.fire('Atención', 'Debes ser menor de 64 años para el programa de licencia en tu barrio.', 'error');
  }

  // 4. Validación de DNI
  if (datos.dni.length < 7 || datos.dni.length > 9) {
    return Swal.fire('DNI Incorrecto', 'El documento debe tener entre 7 y 9 números (sin puntos).', 'error');
  }

  // 5. Validación de Teléfono (Mínimo 8 dígitos)
  if (datos.tel.replace(/\D/g, "").length < 6) {
    return Swal.fire('Teléfono Inválido', 'Por favor ingresa un número de contacto válido (mínimo 6 dígitos).', 'error');
  }

  // Si todo está OK
  desactivarBoton();

  google.script.run
    .withSuccessHandler(res => {
      if(res.success) {
        Swal.fire({
          title: '¡Inscripción Exitosa!',
          text: 'Se ha enviado un correo de confirmación.',
          icon: 'success',
          confirmButtonText: 'Finalizar'
        }).then(() => window.top.location.href = '<?= inst.url ?>');
      } else {
        Swal.fire('Error', res.message, 'error');
        activarBoton();
      }
    })
    .procesarNuevaInscripcion(datos);
});

    function desactivarBoton() {
      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      btn.innerHTML = 'Enviando... <i class="material-icons right">hourglass_empty</i>';
    }

    function activarBoton() {
      const btn = document.getElementById('btnEnviar');
      btn.disabled = false;
      btn.innerHTML = 'Enviar Inscripción <i class="material-icons right">send</i>';
    }
 
    
    function calcularEdad(fecha) {
      const hoy = new Date();
      const cumple = new Date(fecha);
      let edad = hoy.getFullYear() - cumple.getFullYear();
      const m = hoy.getMonth() - cumple.getMonth();
      if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) edad--;
      return edad;
    }
  </script>
</body>

</html>
